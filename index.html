<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rover Dashboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0c0f;
      --surface: #111318;
      --border: #1e2330;
      --accent: #e87c2e;
      --accent2: #4fa3d1;
      --accent3: #a0c878;
      --text: #d8dde8;
      --muted: #5a6278;
      --font: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      padding: 0;
    }

    /* subtle grid bg */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 24px 60px;
    }

    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 48px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 20px;
    }

    .header-left h1 {
      font-size: 1.6rem;
      font-weight: normal;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text);
    }

    .header-left h1 span {
      color: var(--accent);
    }

    .header-left p {
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: 4px;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent3);
      box-shadow: 0 0 6px var(--accent3);
      animation: pulse 2s infinite;
    }

    .status-dot.loading { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
    .status-dot.error { background: #e85050; box-shadow: 0 0 6px #e85050; animation: none; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* stat pills */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 36px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 18px 20px;
      position: relative;
      overflow: hidden;
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
    }

    .stat-card.temp::before { background: var(--accent); }
    .stat-card.pressure::before { background: var(--accent2); }
    .stat-card.count::before { background: var(--accent3); }

    .stat-label {
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 1.8rem;
      font-weight: normal;
      color: var(--text);
    }

    .stat-value span {
      font-size: 0.8rem;
      color: var(--muted);
      margin-left: 4px;
    }

    /* charts */
    .charts {
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 24px 24px 20px;
    }

    .chart-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .chart-title {
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .chart-legend {
      display: flex;
      gap: 16px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .legend-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
    }

    .chart-wrap {
      position: relative;
      height: 220px;
    }

    /* tooltip */
    .custom-tooltip {
      position: fixed;
      background: #1a1e2a;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 14px;
      font-family: var(--font);
      font-size: 0.72rem;
      color: var(--text);
      pointer-events: none;
      display: none;
      z-index: 100;
      line-height: 1.7;
      letter-spacing: 0.03em;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }

    .tooltip-time {
      color: var(--muted);
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
    }

    .tooltip-row { display: flex; justify-content: space-between; gap: 20px; }
    .tooltip-val { font-weight: bold; }
    .col-temp { color: var(--accent); }
    .col-pres { color: var(--accent2); }

    .error-msg {
      background: #1a0e0e;
      border: 1px solid #3a1a1a;
      border-radius: 8px;
      padding: 20px 24px;
      color: #e85050;
      font-size: 0.8rem;
      display: none;
      margin-bottom: 24px;
    }
  </style>
</head>
<body>
<div class="wrapper">

  <header>
    <div class="header-left">
      <h1>Rover <span>Telemetry</span></h1>
      <p>Environmental sensor dashboard</p>
    </div>
    <div class="status">
      <div class="status-dot loading" id="statusDot"></div>
      <span id="statusText">Connecting...</span>
    </div>
  </header>

  <div class="error-msg" id="errorMsg"></div>

  <div class="stats-row">
    <div class="stat-card temp">
      <div class="stat-label">Latest Temperature</div>
      <div class="stat-value" id="latestTemp">—<span>°C</span></div>
    </div>
    <div class="stat-card pressure">
      <div class="stat-label">Latest Pressure</div>
      <div class="stat-value" id="latestPres">—<span>hPa</span></div>
    </div>
    <div class="stat-card count">
      <div class="stat-label">Total Readings</div>
      <div class="stat-value" id="totalCount">—</div>
    </div>
  </div>

  <div class="charts">

    <!-- Temperature -->
    <div class="chart-card">
      <div class="chart-header">
        <div class="chart-title">Temperature over time</div>
        <div class="chart-legend">
          <div class="legend-item"><div class="legend-dot" style="background:var(--accent)"></div> °C</div>
        </div>
      </div>
      <div class="chart-wrap"><canvas id="tempChart"></canvas></div>
    </div>

    <!-- Pressure -->
    <div class="chart-card">
      <div class="chart-header">
        <div class="chart-title">Pressure over time</div>
        <div class="chart-legend">
          <div class="legend-item"><div class="legend-dot" style="background:var(--accent2)"></div> hPa</div>
        </div>
      </div>
      <div class="chart-wrap"><canvas id="presChart"></canvas></div>
    </div>

    <!-- Combined -->
    <div class="chart-card">
      <div class="chart-header">
        <div class="chart-title">Temperature &amp; Pressure over time</div>
        <div class="chart-legend">
          <div class="legend-item"><div class="legend-dot" style="background:var(--accent)"></div> Temp</div>
          <div class="legend-item"><div class="legend-dot" style="background:var(--accent2)"></div> Pressure</div>
        </div>
      </div>
      <div class="chart-wrap"><canvas id="combinedChart"></canvas></div>
    </div>

  </div>
</div>

<div class="custom-tooltip" id="tooltip"></div>

<script>
  const SUPABASE_URL = 'https://dwmgoiaavccqkyomnkwe.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR3bWdvaWFhdmNjcWt5b21ua3dlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2MjAzMzQsImV4cCI6MjA4ODE5NjMzNH0.mPxADPx3kcklAOo-GJwPOIHUVz5vqMnTPysvGgbZhwM';
  const TABLE = 'rover_readings';
  const REFRESH_MS = 60000; // refresh every 60s

  const tooltip = document.getElementById('tooltip');

  function formatTime(iso) {
    const d = new Date(iso);
    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }

  function formatDateTime(iso) {
    const d = new Date(iso);
    return d.toLocaleDateString([], { day: '2-digit', month: 'short' })
      + ' · ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }

  const chartDefaults = {
    responsive: true,
    maintainAspectRatio: false,
    interaction: { mode: 'index', intersect: false },
    plugins: {
      legend: { display: false },
      tooltip: { enabled: false }
    },
    scales: {
      x: {
        ticks: {
          color: '#5a6278',
          font: { family: "'Lucida Sans', Geneva, Verdana, sans-serif", size: 10 },
          maxTicksLimit: 8,
          maxRotation: 0
        },
        grid: { color: '#1e2330' },
        border: { color: '#1e2330' }
      },
      y: {
        ticks: {
          color: '#5a6278',
          font: { family: "'Lucida Sans', Geneva, Verdana, sans-serif", size: 10 }
        },
        grid: { color: '#1e2330' },
        border: { color: '#1e2330' }
      }
    }
  };

  function makeGradient(ctx, color) {
    const g = ctx.createLinearGradient(0, 0, 0, 220);
    g.addColorStop(0, color + '33');
    g.addColorStop(1, color + '00');
    return g;
  }

  let tempChart, presChart, combinedChart;
  let rawData = [];

  function buildCharts(labels, temps, pressures) {
    const tCtx = document.getElementById('tempChart').getContext('2d');
    const pCtx = document.getElementById('presChart').getContext('2d');
    const cCtx = document.getElementById('combinedChart').getContext('2d');

    const sharedOptions = JSON.parse(JSON.stringify(chartDefaults));

    if (tempChart) tempChart.destroy();
    if (presChart) presChart.destroy();
    if (combinedChart) combinedChart.destroy();

    function addTooltipHandler(chart, type) {
      chart.options.plugins.tooltip = { enabled: false };
      chart.canvas.addEventListener('mousemove', (e) => showTooltip(e, chart, type));
      chart.canvas.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });
      chart.canvas.addEventListener('click', (e) => showTooltip(e, chart, type, true));
    }

    tempChart = new Chart(tCtx, {
      type: 'line',
      data: {
        labels,
        datasets: [{
          data: temps,
          borderColor: '#e87c2e',
          backgroundColor: makeGradient(tCtx, '#e87c2e'),
          borderWidth: 2,
          pointRadius: 3,
          pointHoverRadius: 6,
          pointBackgroundColor: '#e87c2e',
          tension: 0.4,
          fill: true
        }]
      },
      options: JSON.parse(JSON.stringify(chartDefaults))
    });
    addTooltipHandler(tempChart, 'temp');

    presChart = new Chart(pCtx, {
      type: 'line',
      data: {
        labels,
        datasets: [{
          data: pressures,
          borderColor: '#4fa3d1',
          backgroundColor: makeGradient(pCtx, '#4fa3d1'),
          borderWidth: 2,
          pointRadius: 3,
          pointHoverRadius: 6,
          pointBackgroundColor: '#4fa3d1',
          tension: 0.4,
          fill: true
        }]
      },
      options: JSON.parse(JSON.stringify(chartDefaults))
    });
    addTooltipHandler(presChart, 'pressure');

    combinedChart = new Chart(cCtx, {
      type: 'line',
      data: {
        labels,
        datasets: [
          {
            label: 'Temperature',
            data: temps,
            borderColor: '#e87c2e',
            backgroundColor: 'transparent',
            borderWidth: 2,
            pointRadius: 3,
            pointHoverRadius: 6,
            pointBackgroundColor: '#e87c2e',
            tension: 0.4,
            yAxisID: 'y'
          },
          {
            label: 'Pressure',
            data: pressures,
            borderColor: '#4fa3d1',
            backgroundColor: 'transparent',
            borderWidth: 2,
            pointRadius: 3,
            pointHoverRadius: 6,
            pointBackgroundColor: '#4fa3d1',
            tension: 0.4,
            yAxisID: 'y2'
          }
        ]
      },
      options: {
        ...JSON.parse(JSON.stringify(chartDefaults)),
        scales: {
          ...JSON.parse(JSON.stringify(chartDefaults.scales)),
          y: {
            ...JSON.parse(JSON.stringify(chartDefaults.scales.y)),
            position: 'left',
          },
          y2: {
            ...JSON.parse(JSON.stringify(chartDefaults.scales.y)),
            position: 'right',
            grid: { drawOnChartArea: false, color: '#1e2330' }
          }
        }
      }
    });
    addTooltipHandler(combinedChart, 'both');
  }

  function showTooltip(e, chart, type, pinned = false) {
    const points = chart.getElementsAtEventForMode(e, 'index', { intersect: false }, true);
    if (!points.length) { if (!pinned) tooltip.style.display = 'none'; return; }

    const idx = points[0].index;
    const row = rawData[idx];
    if (!row) return;

    const dt = formatDateTime(row.recorded_at);
    const temp = row.temperature != null ? row.temperature.toFixed(2) : '—';
    const pres = row.pressure != null ? row.pressure.toFixed(2) : '—';

    let html = `<div class="tooltip-time">${dt}</div>`;
    if (type === 'temp' || type === 'both')
      html += `<div class="tooltip-row"><span>Temperature</span><span class="tooltip-val col-temp">${temp} °C</span></div>`;
    if (type === 'pressure' || type === 'both')
      html += `<div class="tooltip-row"><span>Pressure</span><span class="tooltip-val col-pres">${pres} hPa</span></div>`;

    tooltip.innerHTML = html;
    tooltip.style.display = 'block';

    const tw = tooltip.offsetWidth;
    const th = tooltip.offsetHeight;
    let x = e.clientX + 14;
    let y = e.clientY - th / 2;
    if (x + tw > window.innerWidth - 10) x = e.clientX - tw - 14;
    if (y < 10) y = 10;
    tooltip.style.left = x + 'px';
    tooltip.style.top = y + 'px';
  }

  async function fetchData() {
    const dot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const errorMsg = document.getElementById('errorMsg');

    dot.className = 'status-dot loading';
    statusText.textContent = 'Fetching data...';

    try {
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/${TABLE}?select=*&order=recorded_at.asc&limit=200`,
        {
          headers: {
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
          }
        }
      );

      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();

      errorMsg.style.display = 'none';
      rawData = data;

      const labels = data.map(r => formatTime(r.recorded_at));
      const temps = data.map(r => r.temperature);
      const pressures = data.map(r => r.pressure);

      buildCharts(labels, temps, pressures);

      // stats
      const latest = data[data.length - 1];
      document.getElementById('latestTemp').innerHTML = latest?.temperature != null
        ? `${latest.temperature.toFixed(1)}<span>°C</span>` : `—<span>°C</span>`;
      document.getElementById('latestPres').innerHTML = latest?.pressure != null
        ? `${latest.pressure.toFixed(1)}<span>hPa</span>` : `—<span>hPa</span>`;
      document.getElementById('totalCount').textContent = data.length;

      dot.className = 'status-dot';
      statusText.textContent = `Live · updated ${formatTime(new Date().toISOString())}`;

    } catch (err) {
      dot.className = 'status-dot error';
      statusText.textContent = 'Connection error';
      errorMsg.style.display = 'block';
      errorMsg.textContent = `Could not load data: ${err.message}. Check your Supabase URL and anon key in the script.`;
    }
  }

  fetchData();
  setInterval(fetchData, REFRESH_MS);
</script>
</body>
</html>
