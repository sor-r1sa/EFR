<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rover Dashboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0c0f;
      --surface: #111318;
      --surface2: #161a22;
      --border: #1e2330;
      --accent: #e87c2e;
      --accent2: #4fa3d1;
      --accent3: #a0c878;
      --text: #d8dde8;
      --muted: #5a6278;
      --font: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 24px 60px;
    }

    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 36px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 20px;
    }

    .header-left h1 {
      font-size: 1.6rem;
      font-weight: normal;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text);
    }

    .header-left h1 span { color: var(--accent); }

    .header-left p {
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: 4px;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent3);
      box-shadow: 0 0 6px var(--accent3);
      animation: pulse 2s infinite;
    }
    .status-dot.loading { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
    .status-dot.error   { background: #e85050; box-shadow: 0 0 6px #e85050; animation: none; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    /* ── Time range filter ── */
    .range-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 28px;
    }

    .range-label {
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-right: 6px;
    }

    .range-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--muted);
      font-family: var(--font);
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 6px 14px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }

    .range-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .range-btn.active {
      background: rgba(232,124,46,0.12);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── Stat cards ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
      margin-bottom: 36px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 18px 20px 16px;
      position: relative;
      overflow: hidden;
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
    }

    .stat-card.temp::before     { background: var(--accent); }
    .stat-card.pressure::before { background: var(--accent2); }
    .stat-card.count::before    { background: var(--accent3); }

    .stat-label {
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 1.8rem;
      font-weight: normal;
      color: var(--text);
      line-height: 1;
      margin-bottom: 14px;
    }

    .stat-value span {
      font-size: 0.8rem;
      color: var(--muted);
      margin-left: 4px;
    }

    /* mini stats row inside card */
    .stat-mini-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 4px;
      border-top: 1px solid var(--border);
      padding-top: 12px;
    }

    .stat-mini {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .stat-mini-label {
      font-size: 0.58rem;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .stat-mini-value {
      font-size: 0.8rem;
      color: var(--text);
    }

    .stat-mini-value.accent  { color: var(--accent); }
    .stat-mini-value.accent2 { color: var(--accent2); }
    .stat-mini-value.accent3 { color: var(--accent3); }

    /* range bar inside card */
    .stat-range-wrap {
      margin-top: 10px;
      position: relative;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
    }

    .stat-range-fill {
      position: absolute;
      top: 0; bottom: 0;
      border-radius: 2px;
      opacity: 0.5;
    }

    .stat-range-dot {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 7px; height: 7px;
      border-radius: 50%;
    }

    /* ── Charts ── */
    .charts {
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 24px 24px 20px;
    }

    .chart-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .chart-title {
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .chart-meta {
      font-size: 0.62rem;
      color: var(--muted);
      opacity: 0.6;
      letter-spacing: 0.05em;
    }

    .chart-legend {
      display: flex;
      gap: 16px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

    .chart-wrap {
      position: relative;
      height: 220px;
    }

    /* ── Tooltip ── */
    .custom-tooltip {
      position: fixed;
      background: #1a1e2a;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 14px;
      font-family: var(--font);
      font-size: 0.72rem;
      color: var(--text);
      pointer-events: none;
      display: none;
      z-index: 100;
      line-height: 1.7;
      letter-spacing: 0.03em;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }

    .tooltip-time {
      color: var(--muted);
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
    }

    .tooltip-row { display: flex; justify-content: space-between; gap: 20px; }
    .tooltip-val { font-weight: bold; }
    .col-temp { color: var(--accent); }
    .col-pres { color: var(--accent2); }

    .error-msg {
      background: #1a0e0e;
      border: 1px solid #3a1a1a;
      border-radius: 8px;
      padding: 20px 24px;
      color: #e85050;
      font-size: 0.8rem;
      display: none;
      margin-bottom: 24px;
    }
  </style>
</head>
<body>
<div class="wrapper">

  <header>
    <div class="header-left">
      <h1>Rover <span>Pookie</span></h1>
      <p>Environmental sensor dashboard</p>
    </div>
    <div class="status">
      <div class="status-dot loading" id="statusDot"></div>
      <span id="statusText">Connecting...</span>
    </div>
  </header>

  <!-- Time range filter -->
  <div class="range-bar">
    <span class="range-label">Range</span>
    <button class="range-btn" data-range="1">1h</button>
    <button class="range-btn" data-range="6">6h</button>
    <button class="range-btn active" data-range="24">24h</button>
    <button class="range-btn" data-range="0">All</button>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <div class="stats-row">

    <!-- Temperature card -->
    <div class="stat-card temp">
      <div class="stat-label">Temperature</div>
      <div class="stat-value" id="latestTemp">—<span>°C</span></div>
      <div class="stat-mini-row">
        <div class="stat-mini">
          <div class="stat-mini-label">Min</div>
          <div class="stat-mini-value" id="tempMin">—</div>
        </div>
        <div class="stat-mini">
          <div class="stat-mini-label">Avg</div>
          <div class="stat-mini-value accent" id="tempAvg">—</div>
        </div>
        <div class="stat-mini">
          <div class="stat-mini-label">Max</div>
          <div class="stat-mini-value" id="tempMax">—</div>
        </div>
      </div>
      <div class="stat-range-wrap" id="tempRangeWrap">
        <div class="stat-range-fill" id="tempRangeFill" style="background:var(--accent)"></div>
        <div class="stat-range-dot" id="tempRangeDot" style="background:var(--accent)"></div>
      </div>
    </div>

    <!-- Pressure card -->
    <div class="stat-card pressure">
      <div class="stat-label">Pressure</div>
      <div class="stat-value" id="latestPres">—<span>hPa</span></div>
      <div class="stat-mini-row">
        <div class="stat-mini">
          <div class="stat-mini-label">Min</div>
          <div class="stat-mini-value" id="presMin">—</div>
        </div>
        <div class="stat-mini">
          <div class="stat-mini-label">Avg</div>
          <div class="stat-mini-value accent2" id="presAvg">—</div>
        </div>
        <div class="stat-mini">
          <div class="stat-mini-label">Max</div>
          <div class="stat-mini-value" id="presMax">—</div>
        </div>
      </div>
      <div class="stat-range-wrap" id="presRangeWrap">
        <div class="stat-range-fill" id="presRangeFill" style="background:var(--accent2)"></div>
        <div class="stat-range-dot" id="presRangeDot" style="background:var(--accent2)"></div>
      </div>
    </div>

    <!-- Count card -->
    <div class="stat-card count">
      <div class="stat-label">Readings</div>
      <div class="stat-value" id="totalCount">—</div>
      <div class="stat-mini-row">
        <div class="stat-mini">
          <div class="stat-mini-label">First</div>
          <div class="stat-mini-value" id="firstTime">—</div>
        </div>
        <div class="stat-mini" style="grid-column: span 2">
          <div class="stat-mini-label">Latest</div>
          <div class="stat-mini-value accent3" id="lastTime">—</div>
        </div>
      </div>
    </div>

  </div>

  <div class="charts">

    <div class="chart-card">
      <div class="chart-header">
        <div class="chart-title">Temperature over time</div>
        <div style="display:flex;align-items:center;gap:16px">
          <span class="chart-meta" id="tempMeta"></span>
          <div class="chart-legend">
            <div class="legend-item"><div class="legend-dot" style="background:var(--accent)"></div> °C</div>
          </div>
        </div>
      </div>
      <div class="chart-wrap"><canvas id="tempChart"></canvas></div>
    </div>

    <div class="chart-card">
      <div class="chart-header">
        <div class="chart-title">Pressure over time</div>
        <div style="display:flex;align-items:center;gap:16px">
          <span class="chart-meta" id="presMeta"></span>
          <div class="chart-legend">
            <div class="legend-item"><div class="legend-dot" style="background:var(--accent2)"></div> hPa</div>
          </div>
        </div>
      </div>
      <div class="chart-wrap"><canvas id="presChart"></canvas></div>
    </div>

    <div class="chart-card">
      <div class="chart-header">
        <div class="chart-title">Temperature &amp; Pressure over time</div>
        <div class="chart-legend">
          <div class="legend-item"><div class="legend-dot" style="background:var(--accent)"></div> Temp</div>
          <div class="legend-item"><div class="legend-dot" style="background:var(--accent2)"></div> Pressure</div>
        </div>
      </div>
      <div class="chart-wrap"><canvas id="combinedChart"></canvas></div>
    </div>

  </div>
</div>

<div class="custom-tooltip" id="tooltip"></div>

<script>
  const SUPABASE_URL     = 'https://dwmgoiaavccqkyomnkwe.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR3bWdvaWFhdmNjcWt5b21ua3dlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2MjAzMzQsImV4cCI6MjA4ODE5NjMzNH0.mPxADPx3kcklAOo-GJwPOIHUVz5vqMnTPysvGgbZhwM';
  const TABLE            = 'rover_readings';
  const REFRESH_MS       = 60000;

  const tooltip = document.getElementById('tooltip');
  let rawData = [];
  let currentRange = 24; // hours; 0 = all
  let tempChart, presChart, combinedChart;

  // ── Helpers ────────────────────────────────────────────────
  function formatTime(iso) {
    return new Date(iso).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }
  function formatShortTime(iso) {
    return new Date(iso).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }
  function formatDateTime(iso) {
    const d = new Date(iso);
    return d.toLocaleDateString([], { day: '2-digit', month: 'short' })
      + ' · ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }
  function formatShortDate(iso) {
    return new Date(iso).toLocaleDateString([], { day: '2-digit', month: 'short' });
  }

  function avg(arr) { return arr.reduce((a, b) => a + b, 0) / arr.length; }

  // Filter data by time range
  function filterByRange(data, hours) {
    if (!hours) return data;
    const cutoff = new Date(Date.now() - hours * 3600 * 1000);
    return data.filter(r => new Date(r.recorded_at) >= cutoff);
  }

  // Auto-determine point radius: hide dots when dense
  function pointRadius(n) {
    if (n > 80) return 0;
    if (n > 40) return 1.5;
    return 3;
  }
  function pointHoverRadius(n) {
    return n > 80 ? 4 : 6;
  }

  // Smart x-axis label: just time for short ranges, date+time for long ones
  function makeLabels(data, hours) {
    if (!hours || hours <= 6) return data.map(r => formatShortTime(r.recorded_at));
    if (hours <= 24) return data.map(r => formatShortTime(r.recorded_at));
    // multi-day: show date when it changes, else just time
    return data.map((r, i) => {
      const d = new Date(r.recorded_at);
      const prev = i > 0 ? new Date(data[i-1].recorded_at) : null;
      if (!prev || d.getDate() !== prev.getDate()) {
        return formatShortDate(r.recorded_at);
      }
      return formatShortTime(r.recorded_at);
    });
  }

  // ── Range bar position ──────────────────────────────────────
  function updateRangeBar(fillEl, dotEl, min, max, latest) {
    if (min === max) { fillEl.style.left = '0%'; fillEl.style.width = '100%'; dotEl.style.left = '50%'; return; }
    const pct = (v) => ((v - min) / (max - min) * 100).toFixed(1) + '%';
    const latestPct = parseFloat(pct(latest));
    fillEl.style.left = '0%';
    fillEl.style.width = pct(latest);
    dotEl.style.left = pct(latest);
  }

  // ── Chart defaults ──────────────────────────────────────────
  function getChartDefaults(n) {
    const pr = pointRadius(n);
    const phr = pointHoverRadius(n);
    return {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: { legend: { display: false }, tooltip: { enabled: false } },
      scales: {
        x: {
          ticks: {
            color: '#5a6278',
            font: { family: "'Lucida Sans', Geneva, Verdana, sans-serif", size: 10 },
            maxTicksLimit: 8,
            maxRotation: 0
          },
          grid: { color: '#1e2330' },
          border: { color: '#1e2330' }
        },
        y: {
          ticks: {
            color: '#5a6278',
            font: { family: "'Lucida Sans', Geneva, Verdana, sans-serif", size: 10 }
          },
          grid: { color: '#1e2330' },
          border: { color: '#1e2330' }
        }
      }
    };
  }

  function makeGradient(ctx, color) {
    const g = ctx.createLinearGradient(0, 0, 0, 220);
    g.addColorStop(0, color + '33');
    g.addColorStop(1, color + '00');
    return g;
  }

  // ── Tooltip ─────────────────────────────────────────────────
  function showTooltip(e, chart, type, data) {
    const points = chart.getElementsAtEventForMode(e, 'index', { intersect: false }, true);
    if (!points.length) { tooltip.style.display = 'none'; return; }

    const idx = points[0].index;
    const row = data[idx];
    if (!row) return;

    const dt   = formatDateTime(row.recorded_at);
    const temp = row.temperature != null ? row.temperature.toFixed(2) : '—';
    const pres = row.pressure    != null ? row.pressure.toFixed(2)    : '—';

    let html = `<div class="tooltip-time">${dt}</div>`;
    if (type === 'temp' || type === 'both')
      html += `<div class="tooltip-row"><span>Temperature</span><span class="tooltip-val col-temp">${temp} °C</span></div>`;
    if (type === 'pressure' || type === 'both')
      html += `<div class="tooltip-row"><span>Pressure</span><span class="tooltip-val col-pres">${pres} hPa</span></div>`;

    tooltip.innerHTML = html;
    tooltip.style.display = 'block';

    const tw = tooltip.offsetWidth, th = tooltip.offsetHeight;
    let x = e.clientX + 14, y = e.clientY - th / 2;
    if (x + tw > window.innerWidth - 10) x = e.clientX - tw - 14;
    if (y < 10) y = 10;
    tooltip.style.left = x + 'px';
    tooltip.style.top  = y + 'px';
  }

  // ── Build charts ─────────────────────────────────────────────
  function buildCharts(data) {
    const n          = data.length;
    const labels     = makeLabels(data, currentRange);
    const temps      = data.map(r => r.temperature);
    const pressures  = data.map(r => r.pressure);
    const pr         = pointRadius(n);
    const phr        = pointHoverRadius(n);
    const defaults   = getChartDefaults(n);

    const tCtx = document.getElementById('tempChart').getContext('2d');
    const pCtx = document.getElementById('presChart').getContext('2d');
    const cCtx = document.getElementById('combinedChart').getContext('2d');

    if (tempChart)     tempChart.destroy();
    if (presChart)     presChart.destroy();
    if (combinedChart) combinedChart.destroy();

    function attachTooltip(chart, type) {
      chart.canvas.addEventListener('mousemove', e => showTooltip(e, chart, type, data));
      chart.canvas.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });
    }

    tempChart = new Chart(tCtx, {
      type: 'line',
      data: { labels, datasets: [{
        data: temps,
        borderColor: '#e87c2e',
        backgroundColor: makeGradient(tCtx, '#e87c2e'),
        borderWidth: 2,
        pointRadius: pr, pointHoverRadius: phr,
        pointBackgroundColor: '#e87c2e',
        tension: 0.4, fill: true
      }]},
      options: JSON.parse(JSON.stringify(defaults))
    });
    attachTooltip(tempChart, 'temp');

    presChart = new Chart(pCtx, {
      type: 'line',
      data: { labels, datasets: [{
        data: pressures,
        borderColor: '#4fa3d1',
        backgroundColor: makeGradient(pCtx, '#4fa3d1'),
        borderWidth: 2,
        pointRadius: pr, pointHoverRadius: phr,
        pointBackgroundColor: '#4fa3d1',
        tension: 0.4, fill: true
      }]},
      options: JSON.parse(JSON.stringify(defaults))
    });
    attachTooltip(presChart, 'pressure');

    const combinedOpts = JSON.parse(JSON.stringify(defaults));
    combinedOpts.scales.y2 = {
      ...JSON.parse(JSON.stringify(defaults.scales.y)),
      position: 'right',
      grid: { drawOnChartArea: false, color: '#1e2330' }
    };

    combinedChart = new Chart(cCtx, {
      type: 'line',
      data: { labels, datasets: [
        {
          label: 'Temperature', data: temps,
          borderColor: '#e87c2e', backgroundColor: 'transparent',
          borderWidth: 2, pointRadius: pr, pointHoverRadius: phr,
          pointBackgroundColor: '#e87c2e', tension: 0.4, yAxisID: 'y'
        },
        {
          label: 'Pressure', data: pressures,
          borderColor: '#4fa3d1', backgroundColor: 'transparent',
          borderWidth: 2, pointRadius: pr, pointHoverRadius: phr,
          pointBackgroundColor: '#4fa3d1', tension: 0.4, yAxisID: 'y2'
        }
      ]},
      options: combinedOpts
    });
    attachTooltip(combinedChart, 'both');

    // chart meta labels
    document.getElementById('tempMeta').textContent = n > 80 ? `${n} readings · dots hidden` : '';
    document.getElementById('presMeta').textContent = n > 80 ? `${n} readings · dots hidden` : '';
  }

  // ── Update stats ─────────────────────────────────────────────
  function updateStats(data) {
    if (!data.length) return;

    const temps     = data.map(r => r.temperature).filter(v => v != null);
    const pressures = data.map(r => r.pressure).filter(v => v != null);
    const latest    = data[data.length - 1];
    const first     = data[0];

    const tMin = Math.min(...temps), tMax = Math.max(...temps), tAvg = avg(temps), tLast = latest.temperature;
    const pMin = Math.min(...pressures), pMax = Math.max(...pressures), pAvg = avg(pressures), pLast = latest.pressure;

    // Latest values (big)
    document.getElementById('latestTemp').innerHTML =
      tLast != null ? `${tLast.toFixed(1)}<span>°C</span>` : `—<span>°C</span>`;
    document.getElementById('latestPres').innerHTML =
      pLast != null ? `${pLast.toFixed(1)}<span>hPa</span>` : `—<span>hPa</span>`;
    document.getElementById('totalCount').textContent = data.length;

    // Mini stats
    document.getElementById('tempMin').textContent = `${tMin.toFixed(1)}°`;
    document.getElementById('tempAvg').textContent = `${tAvg.toFixed(1)}°`;
    document.getElementById('tempMax').textContent = `${tMax.toFixed(1)}°`;

    document.getElementById('presMin').textContent = `${pMin.toFixed(0)}`;
    document.getElementById('presAvg').textContent = `${pAvg.toFixed(0)}`;
    document.getElementById('presMax').textContent = `${pMax.toFixed(0)}`;

    // Time stamps
    document.getElementById('firstTime').textContent = formatShortTime(first.recorded_at);
    document.getElementById('lastTime').textContent  = formatShortTime(latest.recorded_at);

    // Range bars
    if (tLast != null) updateRangeBar(
      document.getElementById('tempRangeFill'),
      document.getElementById('tempRangeDot'),
      tMin, tMax, tLast
    );
    if (pLast != null) updateRangeBar(
      document.getElementById('presRangeFill'),
      document.getElementById('presRangeDot'),
      pMin, pMax, pLast
    );
  }

  // ── Render ───────────────────────────────────────────────────
  function render() {
    const data = filterByRange(rawData, currentRange);
    buildCharts(data);
    updateStats(data);
  }

  // ── Fetch ────────────────────────────────────────────────────
  async function fetchData() {
    const dot        = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const errorMsg   = document.getElementById('errorMsg');

    dot.className    = 'status-dot loading';
    statusText.textContent = 'Fetching data...';

    try {
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/${TABLE}?select=*&order=recorded_at.asc&limit=1000`,
        { headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` } }
      );

      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      rawData = await res.json();
      errorMsg.style.display = 'none';

      render();

      const latest  = rawData[rawData.length - 1];
      const secsAgo = Math.floor((Date.now() - new Date(latest.recorded_at)) / 1000);
      const ago     = secsAgo < 60 ? `${secsAgo}s ago` : `${Math.floor(secsAgo/60)}m ${secsAgo%60}s ago`;
      const online  = secsAgo < 120;
      dot.className   = online ? 'status-dot' : 'status-dot error';
      statusText.textContent = online
        ? `Rover online · last reading ${ago}`
        : `Rover offline · last reading ${ago}`;

    } catch (err) {
      dot.className = 'status-dot error';
      statusText.textContent = 'Connection error';
      errorMsg.style.display = 'block';
      errorMsg.textContent = `Could not load data: ${err.message}. Check your Supabase URL and anon key.`;
    }
  }

  // ── Range button wiring ───────────────────────────────────────
  document.querySelectorAll('.range-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentRange = parseInt(btn.dataset.range);
      render();
    });
  });

  // ── Boot ─────────────────────────────────────────────────────
  fetchData();
  setInterval(fetchData, REFRESH_MS);
</script>
</body>
</html>
